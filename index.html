<html>

<head>

	<meta 
		name="viewport" 
		content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/x-icon" href="img/favicon.ico" />
  <title>
  	|| || 
  </title>
  <style type="text/css">
		#title-wrap {
			font-size: 14vw;
			display: inline-block;
			margin: 0;
			padding: 0;
			margin-bottom: 0.5em;
			border: 0.1em solid #edd;
		}
		#title {
			border-right: 0.1em solid #edd;
			border-left: 0.1em solid #edd;
			margin-right: 0.2em;
			margin-left: 0.2em;
			padding-left: 0.2em;
			padding-right: 0.2em;
			margin-top: 0;
			margin-bottom: 0;
			display: inline-block;
			font-family: sans-serif;
			padding-top: 0;
			padding-bottom: 0;
			word-break: break-word;
		}

    body, input {
      background-color: #1a1a1a;
      color: #edd;
			margin: 0px;
			padding: 1em;
			font-size: 105%;
    }
    hr {
      border: 1px solid #555;
    }
    a {
      color: #bbe;
			text-decoration: none;
    }
		#footer-left {
			margin-top: 2em;
			float: left;
		}
		#footer-right {
			margin-top: 2em;
			float: right;
		}
		#footer {
			clear: both; 
			height: 50vh;
			/*
			height: 100vh;
			overflow-y: hidden;
			*/
		}
  </style>
</head>

<body>
	<div>
		<div id="title-wrap">
			<div id="title">
				. . .
			</div>
		</div>
	</div>
	<div style=" font-style: italic;">
		This page allows using a tab as a named placeholder in your web browser.
	</div>
	<br/>
	<div>
		To set tab name, add ?t=title to end of URL.
	</div>
	<br/>
	<div>
		Or enter here: <input id="setTitle"/>
	</div>
	<div id="footer-left">
		<a href="https://github.com/andrewrproper/browser-tab-placeholder" target="_blank" rel="noopener">GitHub</a>
	</div>
	<div id="footer-right">
		<a href="https://andrewrproper.github.io/browser-tab-placeholder" target="_blank" rel="noopener">Website</a>
	</div>
	<div id="footer"></div>

	<script type="text/javascript">
		const endDelim = ' . . . . . . . . . . . . . . . . . . . . .';

		setTitleTo("..."); // default

		// https://stackoverflow.com/questions/901115/how-can-i-get-query-string-values-in-javascript
		const params = new Proxy(
			new URLSearchParams(window.location.search), {
				get: (searchParams, prop) => searchParams.get(prop)
			}
		);

		function setTitleTo (title) {
			//const newDocTitle = "-[ " + title + " ]-";
			const newDocTitle = "|| " + title + " || " + endDelim;
			document.getElementById("title").innerHTML = title;
			document.title = newDocTitle;
		}
		let input = document.getElementById("setTitle");
			
		console.debug(params);
		let title = params.t;
		if ( title !== undefined && title !== null && title !== "" ) {
			console.debug("found title from params: "+title);
			setTitleTo(title);
			input.value = title;
		} else {
			console.debug("no title found from params");
		}

		input.addEventListener('change', function(event) {
			let title = this.value;
			if ( title !== undefined && title !== null && title !== "" ) {
				console.debug("found title from text input: "+title);
				setTitleTo(title);

				let searchParams = new URLSearchParams(window.location.search);
				searchParams.set("t", title);
				window.location.search = searchParams;
			} else {
				console.debug("no title found from text input");
			}
		});

		input.focus();
	</script>
</body>

</html>
