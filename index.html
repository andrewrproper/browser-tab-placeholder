<html>

<head>

	<meta 
		name="viewport" 
		content="width=device-width, initial-scale=1.0" />

  <title>
  	-[ . . . ]-
  </title>
  <style type="text/css">
    body, input {
      background-color: black;
      color: #edd;
			margin: 0px;
			padding: 1em;
			overflow-y: hidden;
    }
    hr {
      border: 1px solid #555;
    }
    a {
      color: #bbe;
			text-decoration: none;
    }
		#footer-left {
			margin-top: 4em;
			float: left;
		}
		#footer-right {
			margin-top: 4em;
			float: right;
		}
		#footer {
			clear: both; 
			height: 100vh;
			overflow-y: hidden;
		}
  </style>
</head>

<body>
	<h1 id="title">
  	-[ . . . ]-
	</h1>
	<div style=" font-style: italic;">
		This page allows using a tab as a named placeholder in your web browser.
	</div>
	<br/>
	<div>
		To set tab name, add ?t=title to end of URL.
	</div>
	<br/>
	<div>
		Or enter here: <input id="setTitle"/>
	</div>
	<div id="footer-left">
		<a href="https://github.com/andrewrproper/browser-tab-placeholder" target="_blank" rel="noopener">GitHub</a>
	</div>
	<div id="footer-right">
		<a href="https://andrewrproper.github.io/browser-tab-placeholder" target="_blank" rel="noopener">Website</a>
	</div>
	<div id="footer"></div>

	<script type="text/javascript">
		// https://stackoverflow.com/questions/901115/how-can-i-get-query-string-values-in-javascript
		const params = new Proxy(
			new URLSearchParams(window.location.search), {
				get: (searchParams, prop) => searchParams.get(prop)
			}
		);

		function setTitleTo (title) {
			let newTitle = "-[ " + title + " ]-";
			document.title = newTitle;
			document.getElementById("title").innerHTML = newTitle;
		}
		let input = document.getElementById("setTitle");
			
		console.debug(params);
		let title = params.t;
		if ( title !== undefined && title !== null && title !== "" ) {
			console.debug("found title from params: "+title);
			setTitleTo(title);
			input.value = title;
		} else {
			console.debug("no title found from params");
		}

		input.addEventListener('change', function(event) {
			let title = this.value;
			if ( title !== undefined && title !== null && title !== "" ) {
				console.debug("found title from text input: "+title);
				setTitleTo(title);

				let searchParams = new URLSearchParams(window.location.search);
				searchParams.set("t", title);
				window.location.search = searchParams;
			} else {
				console.debug("no title found from text input");
			}
		});
		input.focus();
	</script>
</body>

</html>
